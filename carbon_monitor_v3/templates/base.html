<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carbon Footprint Monitor – IPRC</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f0;
      color: #1a3c34;
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 230px;
      background: #1a3c34;
      min-height: 100vh;
      position: fixed;
      top: 0; left: 0;
      display: flex;
      flex-direction: column;
      padding: 0 0 20px;
      z-index: 100;
    }

    .sidebar-logo {
      background: #2c5f2d;
      padding: 20px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo .leaf { font-size: 28px; }

    .sidebar-logo h2 {
      color: #fff;
      font-size: 14px;
      line-height: 1.3;
    }

    .sidebar-logo span {
      display: block;
      font-size: 10px;
      color: #97bc62;
      font-weight: 400;
    }

    .sidebar nav { margin-top: 20px; flex: 1; }

    .sidebar nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 20px;
      color: #c8e6c9;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.2s, color 0.2s;
      border-left: 3px solid transparent;
    }

    .sidebar nav a:hover,
    .sidebar nav a.active {
      background: #2c5f2d;
      color: #fff;
      border-left-color: #97bc62;
    }

    .sidebar nav a .icon { font-size: 18px; width: 22px; text-align: center; }

    .sidebar-footer {
      padding: 14px 20px;
      font-size: 11px;
      color: #4a7c59;
      border-top: 1px solid #2c5f2d;
    }

    /* ── Main Content ── */
    .main {
      margin-left: 230px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      background: #fff;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #e0ebe0;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar h1 { font-size: 20px; color: #1a3c34; }

    .topbar .badge {
      background: #97bc62;
      color: #1a3c34;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .content { padding: 28px; flex: 1; }

    /* ── Cards ── */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 18px; margin-bottom: 28px; }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      border-top: 4px solid #2c5f2d;
    }

    .card.orange { border-top-color: #b85c00; }
    .card.blue   { border-top-color: #1a5276; }
    .card.purple { border-top-color: #6d2e46; }

    .card .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .card .value { font-size: 30px; font-weight: 700; color: #1a3c34; }
    .card .unit  { font-size: 12px; color: #64748b; margin-top: 2px; }

    /* ── Charts Row ── */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }

    .chart-box {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .chart-box h3 { font-size: 14px; color: #2c5f2d; margin-bottom: 14px; font-weight: 600; }

    /* ── Table ── */
    .table-box {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .table-box h3 {
      font-size: 14px;
      color: #2c5f2d;
      margin-bottom: 14px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { background: #f0f4f0; color: #2c5f2d; padding: 10px 12px; text-align: left; font-weight: 600; font-size: 12px; }
    tbody tr { border-bottom: 1px solid #f0f4f0; transition: background 0.15s; }
    tbody tr:hover { background: #f8fbf8; }
    tbody td { padding: 10px 12px; color: #334155; }

    .badge-activity {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-electricity { background: #d4edda; color: #2c5f2d; }
    .badge-fuel        { background: #fdebd0; color: #b85c00; }
    .badge-transport   { background: #d6eaf8; color: #1a5276; }
    .badge-waste       { background: #f5eef8; color: #6d2e46; }

    /* ── Form ── */
    .form-box {
      background: #fff;
      border-radius: 10px;
      padding: 28px;
      max-width: 600px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .form-box h2 { font-size: 18px; color: #1a3c34; margin-bottom: 22px; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 6px; }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 7px;
      font-size: 14px;
      color: #1a3c34;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #2c5f2d; }

    .form-hint { font-size: 11px; color: #97bc62; margin-top: 4px; }

    .btn {
      padding: 11px 24px;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary { background: #2c5f2d; color: #fff; }
    .btn-primary:hover { background: #1a3c34; }
    .btn-danger  { background: #c0392b; color: #fff; font-size: 12px; padding: 6px 14px; }
    .btn-danger:hover { background: #a93226; }
    .btn-outline { background: transparent; border: 1.5px solid #2c5f2d; color: #2c5f2d; }
    .btn-outline:hover { background: #2c5f2d; color: #fff; }

    /* ── Alert ── */
    .alert-box {
      background: #eef7ee;
      border: 1.5px solid #97bc62;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #2c5f2d;
    }

    /* ── Emission preview box ── */
    #preview-box {
      background: #eef7ee;
      border: 1.5px solid #97bc62;
      border-radius: 8px;
      padding: 14px 18px;
      margin-top: 14px;
      font-size: 14px;
      color: #1a3c34;
      display: none;
    }

    #preview-box strong { font-size: 22px; color: #2c5f2d; }

    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-logo h2, .sidebar-logo span, .sidebar nav a span { display: none; }
      .main { margin-left: 60px; }
      .charts-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <span class="leaf">🌿</span>
    <h2>Carbon Monitor <span>IPRC Activities</span></h2>
  </div>
  <nav>
    <a href="/dashboard" class="{{ 'active' if request.endpoint == 'dashboard' else '' }}">
      <span class="icon">📊</span><span>Dashboard</span>
    </a>
    <a href="/add" class="{{ 'active' if request.endpoint == 'add_emission' else '' }}">
      <span class="icon">➕</span><span>Add Activity</span>
    </a>
    <a href="/records" class="{{ 'active' if request.endpoint == 'records' else '' }}">
      <span class="icon">📋</span><span>All Records</span>
    </a>
    <a href="/upload" class="{{ 'active' if request.endpoint == 'upload_file' else '' }}">
      <span class="icon">📂</span><span>Upload File</span>
    </a>
    <a href="/recommendations" class="{{ 'active' if request.endpoint == 'recommendations' else '' }}">
      <span class="icon">💡</span><span>Recommendations</span>
    </a>
  </nav>
  <div class="sidebar-footer">NCCEE-26 Project<br>Alliance University</div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <h1>{% block page_title %}Carbon Footprint Monitor{% endblock %}</h1>
    <span class="badge">🌱 IPRC</span>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>

</body>
</html>
